<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MasterLMS - Lỗi kết nối</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100vh;
    background: #0f172a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    user-select: none;
  }
  .icon { font-size: 64px; }
  h2 { font-size: 22px; font-weight: 700; }
  p { font-size: 14px; color: rgba(255,255,255,0.5); text-align: center; max-width: 420px; line-height: 1.6; }
  .url-badge {
    font-size: 12px; color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 6px 14px; border-radius: 6px;
    font-family: monospace;
    max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .btns { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; justify-content: center; }
  button {
    padding: 10px 24px; border-radius: 8px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: opacity 0.2s, transform 0.1s;
  }
  button:hover { opacity: 0.85; }
  button:active { transform: scale(0.98); }
  .btn-retry    { background: #3b82f6; color: #fff; }
  .btn-settings { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.12); }
</style>
</head>
<body>
<div class="icon">🔌</div>
<h2>Không thể kết nối máy chủ</h2>
<p>Không thể tải trang từ máy chủ. Vui lòng kiểm tra kết nối mạng và địa chỉ máy chủ LMS của bạn.</p>
<div class="url-badge" id="urlBadge"></div>
<div class="btns">
  <button class="btn-retry" onclick="retry()">Thử lại</button>
  <button class="btn-settings" onclick="openSettings()">Cài đặt máy chủ</button>
</div>

<script>
  async function init() {
    if (window.electronAPI) {
      const url = await window.electronAPI.getServerUrl();
      if (url) document.getElementById('urlBadge').textContent = url;
    }
  }

  function retry() {
    if (window.electronAPI) {
      window.electronAPI.reload();
    } else {
      window.location.reload();
    }
  }

  async function openSettings() {
    if (window.electronAPI) {
      await window.electronAPI.showSetup();
    }
  }

  init();
</script>
</body>
</html>
