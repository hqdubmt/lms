<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MasterLMS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 480px; height: 300px;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: drag;
  }
  .card {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at center, rgba(59,130,246,0.15) 0%, transparent 60%);
    pointer-events: none;
  }
  .logo {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    box-shadow: 0 8px 32px rgba(59,130,246,0.4);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(59,130,246,0.4); }
    50% { transform: scale(1.05); box-shadow: 0 12px 40px rgba(59,130,246,0.6); }
  }
  .title {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-top: -12px;
  }
  .loader {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .dot {
    width: 8px; height: 8px;
    background: #3b82f6;
    border-radius: 50%;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; background: #6366f1; }
  .dot:nth-child(3) { animation-delay: 0.4s; background: #8b5cf6; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-8px); opacity: 1; }
  }
  .version {
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">📚</div>
  <div class="title">MasterLMS</div>
  <div class="subtitle">Nền tảng học tập thông minh</div>
  <div class="loader">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="version">v1.0.0</div>
</div>
</body>
</html>
