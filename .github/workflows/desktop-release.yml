name: Build & Release Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.5.0)'
        required: true
        default: '1.5.0'

jobs:
  # ─── DESKTOP: WINDOWS ───────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install & Build
        working-directory: apps/desktop
        run: |
          npm install
          npx electron-builder --win --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: apps/desktop/dist/*.exe
          retention-days: 7

  # ─── DESKTOP: macOS ─────────────────────────────────────────────
  build-mac:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install & Build
        working-directory: apps/desktop
        run: |
          npm install
          npx electron-builder --mac --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: apps/desktop/dist/*.dmg
          retention-days: 7

  # ─── DESKTOP: LINUX ─────────────────────────────────────────────
  build-linux:
    name: Linux (.AppImage + .deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install & Build
        working-directory: apps/desktop
        run: |
          npm install
          npx electron-builder --linux --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
          retention-days: 7

  # ─── MOBILE: ANDROID ────────────────────────────────────────────
  build-android:
    name: Android (.apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        run: |
          # GitHub ubuntu-latest có sẵn SDK tại /usr/local/lib/android/sdk
          SDK=${ANDROID_HOME:-/usr/local/lib/android/sdk}
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          $SDK/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" <<< "y" 2>/dev/null || true

      - name: Install Capacitor dependencies
        working-directory: apps/mobile
        run: npm install

      - name: Sync Capacitor
        working-directory: apps/mobile
        run: npx cap sync android

      - name: Build APK (debug)
        working-directory: apps/mobile/android
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/gradle.log
          tail -80 /tmp/gradle.log

      - name: Rename APK
        run: |
          APK_SRC=apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if [ ! -f "$APK_SRC" ]; then
            echo "APK not found at $APK_SRC — build may have failed"
            exit 1
          fi
          mkdir -p output
          cp "$APK_SRC" \
             output/MasterLMS-${{ github.ref_name || inputs.version }}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: output/*.apk
          retention-days: 7

  # ─── MOBILE: iOS ────────────────────────────────────────────────
  build-ios:
    name: iOS (.ipa)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Capacitor dependencies
        working-directory: apps/mobile
        run: npm install

      - name: Add iOS platform
        working-directory: apps/mobile
        run: npx cap add ios

      - name: Sync Capacitor
        working-directory: apps/mobile
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: apps/mobile/ios/App
        run: pod install

      - name: Build iOS (unsigned)
        working-directory: apps/mobile/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        run: |
          mkdir -p output
          cd apps/mobile/ios/App/build/Build/Products/Release-iphonesimulator
          zip -r "MasterLMS-${{ github.ref_name || inputs.version }}-ios-simulator.zip" App.app
          cp *.zip /home/runner/work/lms/lms/output/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: output/*.zip
          retention-days: 7
        continue-on-error: true

  # ─── RELEASE ────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-mac, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && contains(needs.*.result, 'success') }}
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', inputs.version) }}
          name: MasterLMS ${{ github.ref_name || format('v{0}', inputs.version) }}
          body: |
            ## Cập nhật (${{ github.ref_name || format('v{0}', inputs.version) }})

            ### AI Chatbox
            - **Chatbox AI**: Hỗ trợ 4 mode (Giải thích, Bài tập, Chấm bài, Quiz) theo môn học
            - **Streaming SSE**: Phản hồi token theo thời gian thực, không chờ toàn bộ câu trả lời
            - **Markdown + LaTeX**: Hiển thị công thức toán, code, bảng biểu trong chat
            - **Multi-provider**: Groq → Gemini → Ollama (tự động fallback)
            - **Ollama 7b timeout**: Tăng timeout lên 180s để hỗ trợ model lớn (qwen2.5:7b cần ~90s load)
            - **Token refresh**: Tự động refresh token khi hết hạn trong quá trình chat
            - **STT**: Nhận diện giọng nói (Web Speech API)

            ### Sửa lỗi (v1.3.0 → v1.4.0)
            - **Toán — MATCHING Tiếng Việt**: Sửa lỗi chấm điểm sai do thứ tự key không nhất quán
            - **Toán — FILL_BLANK**: Sửa lỗi đáp án hiển thị trong câu hỏi khi token lặp trong công thức
            - **Toán — CALCULATION**: Sửa lỗi đáp án hardcode `'0'` khi ví dụ không có số
            - **Ngoại ngữ — MATCHING**: Thêm null guard tránh crash khi dữ liệu câu hỏi bị lỗi
            - **Ngoại ngữ — /vocab-sets/tree**: Sửa route bị shadow bởi `/:id`, không bao giờ được gọi
            - **Cache**: PATCH topic/set/exercise giờ xóa cache đúng cách (trước đây chỉ DELETE mới xóa)
            - **Analytics**: Sửa lỗi `due count` bị đóng băng theo thời điểm cache populate

            ### Hiệu năng
            - **Redis cache**: Toán, Tiếng Việt, Ngoại ngữ — topics/sets/exercises/leaderboard/analytics
            - **HTTP Brotli/gzip**: Toàn bộ API response > 1KB được nén tự động
            - **7 Composite indexes**: PostgreSQL query nhanh hơn khi filter theo isPublic/grade/subject
            - **Next.js Production mode**: Frontend phản hồi nhanh hơn 3–5x so với dev mode

            ### Chất lượng bài tập
            - **Loại CALCULATION mới**: Tạo bài tính toán từ ví dụ có số thực tế
            - **AI prompt cải thiện**: Tạo câu hỏi thực hành (tính toán, áp dụng công thức) thay vì thuộc lòng định nghĩa

            ## 📥 Tải MasterLMS

            | Nền tảng | File | Ghi chú |
            |---|---|---|
            | 🪟 Windows | `MasterLMS-Setup-*.exe` | Cài đặt (khuyến nghị) |
            | 🪟 Windows | `MasterLMS-*-win.zip` | Portable, chạy thẳng |
            | 🍎 macOS | `MasterLMS-*-mac.zip` | Intel + Apple Silicon |
            | 🐧 Linux | `MasterLMS-*.AppImage` | Chạy trực tiếp |
            | 🐧 Linux | `masterlms-desktop_*.deb` | Ubuntu/Debian |
            | 🤖 Android | `MasterLMS-*-android.apk` | Cài từ file APK |
            | 🍏 iOS | Xem ghi chú bên dưới | — |

            ### Cách sử dụng
            1. Tải file phù hợp hệ điều hành
            2. Cài đặt và mở ứng dụng
            3. Nhập địa chỉ máy chủ LMS của trường
            4. Đăng nhập và sử dụng

            ### Android — Cài APK
            - Tải file `.apk` về điện thoại
            - Bật **Cài ứng dụng từ nguồn không rõ** trong Cài đặt → Bảo mật
            - Mở file APK để cài đặt

            ### Kích hoạt AI (tuỳ chọn — trên server)
            Thêm vào `deploy/.env` để dùng AI miễn phí:
            ```
            GROQ_API_KEY=gsk_...        # console.groq.com — 6000 req/ngày
            GOOGLE_GEMINI_API_KEY=AIza... # aistudio.google.com — 1500 req/ngày
            ```

            ### iOS — TestFlight / Enterprise
            > iOS yêu cầu tài khoản Apple Developer ($99/năm) để phân phối.
            > Liên hệ quản trị viên để được thêm vào TestFlight.
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.apk
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
