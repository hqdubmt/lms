name: Build & Release Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  # ─── DESKTOP: WINDOWS ───────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install & Build
        working-directory: apps/desktop
        run: |
          npm install
          npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: apps/desktop/dist/*.exe
          retention-days: 7

  # ─── DESKTOP: macOS ─────────────────────────────────────────────
  build-mac:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install & Build
        working-directory: apps/desktop
        run: |
          npm install
          npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: apps/desktop/dist/*.dmg
          retention-days: 7

  # ─── DESKTOP: LINUX ─────────────────────────────────────────────
  build-linux:
    name: Linux (.AppImage + .deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install & Build
        working-directory: apps/desktop
        run: |
          npm install
          npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
          retention-days: 7

  # ─── MOBILE: ANDROID ────────────────────────────────────────────
  build-android:
    name: Android (.apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor dependencies
        working-directory: apps/mobile
        run: npm install

      - name: Add Android platform
        working-directory: apps/mobile
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: apps/mobile
        run: npx cap sync android

      - name: Build APK (debug)
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mkdir -p output
          cp apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk output/MasterLMS-${{ github.ref_name || inputs.version }}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: output/*.apk
          retention-days: 7

  # ─── MOBILE: iOS ────────────────────────────────────────────────
  build-ios:
    name: iOS (.ipa)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Capacitor dependencies
        working-directory: apps/mobile
        run: npm install

      - name: Add iOS platform
        working-directory: apps/mobile
        run: npx cap add ios

      - name: Sync Capacitor
        working-directory: apps/mobile
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: apps/mobile/ios/App
        run: pod install

      - name: Build iOS (unsigned)
        working-directory: apps/mobile/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        run: |
          mkdir -p output
          cd apps/mobile/ios/App/build/Build/Products/Release-iphonesimulator
          zip -r "MasterLMS-${{ github.ref_name || inputs.version }}-ios-simulator.zip" App.app
          cp *.zip /home/runner/work/lms/lms/output/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: output/*.zip
          retention-days: 7
        continue-on-error: true

  # ─── RELEASE ────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-mac, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', inputs.version) }}
          name: MasterLMS ${{ github.ref_name || format('v{0}', inputs.version) }}
          body: |
            ## 📥 Tải MasterLMS

            | Nền tảng | File | Ghi chú |
            |---|---|---|
            | 🪟 Windows | `MasterLMS-Setup-*.exe` | Cài đặt (khuyến nghị) |
            | 🪟 Windows | `MasterLMS-*.exe` Portable | Chạy thẳng, không cài |
            | 🍎 macOS | `MasterLMS-*.dmg` | Intel + Apple Silicon |
            | 🐧 Linux | `MasterLMS-*.AppImage` | Chạy trực tiếp |
            | 🐧 Linux | `MasterLMS-*.deb` | Ubuntu/Debian |
            | 🤖 Android | `MasterLMS-*-android.apk` | Cài từ file APK |
            | 🍏 iOS | Xem ghi chú bên dưới | — |

            ### Cách sử dụng
            1. Tải file phù hợp hệ điều hành
            2. Cài đặt và mở ứng dụng
            3. Nhập địa chỉ máy chủ LMS của trường
            4. Đăng nhập và sử dụng

            ### Android — Cài APK
            - Tải file `.apk` về điện thoại
            - Bật **Cài ứng dụng từ nguồn không rõ** trong Cài đặt → Bảo mật
            - Mở file APK để cài đặt

            ### iOS — TestFlight / Enterprise
            > iOS yêu cầu tài khoản Apple Developer ($99/năm) để phân phối.
            > Liên hệ quản trị viên để được thêm vào TestFlight.
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.apk
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
