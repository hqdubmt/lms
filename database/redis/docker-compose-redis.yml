version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: redis_du
    restart: always
    env_file:
      - .env
    ports:
      - "${REDIS_PORT}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data

volumes:
  redis-data:
    driver: local
networks:
  default:
    driver: bridge
