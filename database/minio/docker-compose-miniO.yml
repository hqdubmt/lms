version: '3.8'

services:
  minio:
    image: minio/minio:RELEASE.2022-03-17T06-34-49Z
    container_name: minio_du
    restart: always

    env_file:
      - .env

    ports:
      - "127.0.0.1:${adminport}:9000"
      - "127.0.0.1:${serverport}:9001"

    volumes:
      - minio_data:/data

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    command: server /data --console-address ":9001"

    networks:
      - minio_network

volumes:
  minio_data:

networks:
  minio_network:
    driver: bridge
