# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ─── Next.js static assets (long cache) ──────────────────────────────────────
location /_next/static/ {
  proxy_pass http://web;
  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_set_header Host $host;
  add_header Cache-Control "public, max-age=31536000, immutable";
  expires 1y;
}

# ─── HLS video segments ───────────────────────────────────────────────────────
location ~ ^/api/lessons/[^/]+/hls/.*\.ts$ {
  proxy_pass http://api;
  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  add_header Cache-Control "public, max-age=3600";
  proxy_buffering on;
  proxy_buffer_size 4k;
  proxy_buffers 8 4k;
}

# ─── HLS m3u8 playlists (no cache) ───────────────────────────────────────────
location ~ ^/api/lessons/[^/]+/hls/.*\.m3u8$ {
  proxy_pass http://api;
  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  add_header Cache-Control "no-cache, no-store";
  add_header Access-Control-Allow-Origin "*";
}

# ─── AI Chat SSE (streaming — disable buffering) ─────────────────────────────
location /api/ai/chat {
  rewrite ^/api/(.*)$ /$1 break;
  proxy_pass http://api;
  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_buffering off;
  proxy_cache off;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;
}

# ─── API routes ───────────────────────────────────────────────────────────────
location /api/ {
  rewrite ^/api/(.*)$ /$1 break;
  proxy_pass http://api;
  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;
  client_max_body_size 500m;
}

# ─── Socket.IO WebSocket ──────────────────────────────────────────────────────
location /socket.io/ {
  proxy_pass http://api/socket.io/;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_read_timeout 86400s;
}

# ─── Next.js HMR WebSocket (dev mode hot reload) ─────────────────────────────
location /_next/webpack-hmr {
  proxy_pass http://web;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_set_header Host $host;
  proxy_read_timeout 86400s;
}

# ─── Next.js frontend ─────────────────────────────────────────────────────────
location / {
  proxy_pass http://web;
  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 60s;
  # Ensure HTML pages are never cached by browser or proxy
  add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  add_header Pragma "no-cache" always;
  add_header Expires "0" always;
}
